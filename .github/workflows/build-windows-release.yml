name: Build Windows desktop release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build inputs
        run: npm run validate:build

      - name: Build Windows distributables
        run: npm run dist:win

      - name: Publish GitHub Release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/electron/*.exe
          generate_release_notes: true
